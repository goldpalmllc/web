name: Update Angi Reviews

on:
  schedule:
    # Every Monday at 13:00 UTC (~8am Eastern / 9am during EST)
    - cron: "0 13 * * 1"
  workflow_dispatch: {}   # lets you click "Run workflow" in the Actions tab to test it manually

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest Angi reviews
        run: python3 scripts/update_reviews.py

      - name: Commit reviews.json if it changed
        run: |
          if git diff --quiet -- reviews.json; then
            echo "No review changes this week."
          else
            git config user.name "goldpalm-reviews-bot"
            git config user.email "actions@users.noreply.github.com"
            git add reviews.json
            git commit -m "Weekly Angi review update"
            git push
          fi
