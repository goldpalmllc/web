<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Overlay Designer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    .actions button {
      margin: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📄 PDF Overlay Designer</h1>
      <p>Click on preview to place text • Edit • Generate</p>
    </header>

    <div class="main">
      <section class="sidebar">
        <h2>Templates</h2>
        <select id="templateSelect" onchange="loadTemplate()"></select><br><br>
        <button onclick="addNewTemplate()">+ New Template</button>
        <button onclick="saveTemplates()">💾 Save All Templates</button>
      </section>

      <section class="editor">
        <h2 id="templateName">Select Template</h2>
        
        <div class="preview-container">
          <canvas id="pdfCanvas" style="border:1px solid #ccc; max-width:100%; cursor:crosshair;"></canvas>
          <div id="clickHint" style="position:absolute; color:#666; font-size:0.9em; pointer-events:none;">Click on PDF to add text area</div>
        </div>

        <h3>Text Areas</h3>
        <div id="areasList"></div>

        <div class="actions">
          <button onclick="previewPDF()" style="background:#28a745; color:white;">👁 Preview Filled PDF</button>
          <button onclick="generatePDF()" class="primary">⬇️ Generate & Download</button>
          <button onclick="sendToOutlook()" class="secondary">✉️ Send via Outlook</button>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
